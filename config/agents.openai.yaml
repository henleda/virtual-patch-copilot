# Model-independence: every agent on OpenAI's flagship (no code change — just a different config,
# routed through the same LiteLLM+instructor harness). The fair counterpart to the all-Claude
# default in agents.yaml for the cross-model benchmark:
#   VPCOPILOT_CONFIG=config/agents.openai.yaml vpcopilot console
# Needs OPENAI_API_KEY. timeout bumped for the big-app triage/generate calls.
defaults:
  model: openai/gpt-4.1
  temperature: 0.1
  max_retries: 3
  timeout: 180

agents:
  discover:  { model: openai/gpt-4.1 }
  verify:    { model: openai/gpt-4.1 }
  triage:    { model: openai/gpt-4.1 }
  generate:  { model: openai/gpt-4.1 }
  remediate: { model: openai/gpt-4.1 }
  probe:     { model: openai/gpt-4.1 }
