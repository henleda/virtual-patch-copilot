name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"   # nightly live-smoke + bench-gate
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[deploy,console,dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Test (unit — no live tenant/model/network)
        run: pytest -m "not live and not bench" --cov=vpcopilot --cov-report=term-missing --cov-fail-under=65

  # Nightly + manual only: the live smoke and the discovery bench need real XC/model creds and are
  # never gated on a PR. The bench fails the job if discovery quality drops below BASELINE.md.
  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[deploy,console,dev]"
      - name: Live smoke + bench-gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XC_API_URL: ${{ secrets.XC_API_URL }}
          XC_API_TOKEN: ${{ secrets.XC_API_TOKEN }}
          XC_NAMESPACE: ${{ secrets.XC_NAMESPACE }}
        run: pytest -m "live or bench"
